<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 — StudyGroupManager</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />

  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Axios -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   '#2563EB',
            primaryDk: '#1E40AF',
            primaryLt: '#DBEAFE',
            success:   '#059669',
            successLt: '#D1FAE5',
            danger:    '#DC2626',
            dangerLt:  '#FEE2E2',
            surface:   '#F8FAFC',
            muted:     '#94A3B8',
            border:    '#E2E8F0',
            dark:      '#0F172A',
            mid:       '#334155',
          },
          fontFamily: {
            sans:    ['Pretendard', 'sans-serif'],
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          boxShadow: {
            card: '0 4px 24px rgba(37,99,235,.10), 0 1px 4px rgba(15,23,42,.06)',
            btn:  '0 2px 12px rgba(37,99,235,.30)',
          },
          animation: {
            'fade-up': 'fadeUp .55s cubic-bezier(.22,1,.36,1) both',
            'fade-in': 'fadeIn .4s ease both',
            'shake':   'shake .4s ease',
          },
          keyframes: {
            fadeUp:  { from:{opacity:0,transform:'translateY(20px)'}, to:{opacity:1,transform:'translateY(0)'} },
            fadeIn:  { from:{opacity:0}, to:{opacity:1} },
            shake:   { '0%,100%':{transform:'translateX(0)'}, '20%,60%':{transform:'translateX(-6px)'}, '40%,80%':{transform:'translateX(6px)'} },
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; }

    /* 배경 메쉬 */
    .bg-mesh {
      background-color: #EFF6FF;
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(37,99,235,.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%,  rgba(30,64,175,.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(96,165,250,.07) 0%, transparent 70%);
    }

    /* 장식 원 */
    .deco-circle {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.15), transparent 70%);
      pointer-events: none;
    }

    /* 카드 */
    .glass-card {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* Input */
    .input-field {
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .input-field:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
      background: #fff;
      outline: none;
    }
    .input-field.is-valid {
      border-color: #059669;
      box-shadow: 0 0 0 3px rgba(5,150,105,.12);
    }
    .input-field.is-invalid {
      border-color: #DC2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,.12);
      animation: shake .4s ease;
    }

    /* 입력 그룹 아이콘 */
    .input-wrap { position: relative; }
    .input-wrap .ico {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #94A3B8; pointer-events: none;
      transition: color .2s;
    }
    .input-wrap:focus-within .ico { color: #2563EB; }
    .input-wrap input { padding-left: 42px; }

    /* 상태 아이콘 (우측) */
    .status-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      transition: opacity .2s;
    }
    .input-wrap input.has-status { padding-right: 40px; }

    /* pw 토글 */
    .pw-toggle {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); cursor: pointer;
      color: #94A3B8; transition: color .2s;
    }
    .pw-toggle:hover { color: #2563EB; }

    /* 비밀번호 강도 바 */
    .strength-bar { transition: width .4s ease, background .4s ease; }

    /* 회원가입 버튼 */
    .signup-btn {
      background: linear-gradient(135deg, #2563EB, #1E40AF);
      transition: box-shadow .2s, transform .15s, filter .2s;
    }
    .signup-btn:hover:not(:disabled) {
      box-shadow: 0 6px 22px rgba(37,99,235,.40);
      transform: translateY(-1px);
      filter: brightness(1.06);
    }
    .signup-btn:active { transform: translateY(0); }
    .signup-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* 진행 단계 */
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      transition: all .3s ease;
    }
    .step-dot.active { width: 24px; border-radius: 4px; background: #2563EB; }
    .step-dot.done { background: #059669; }
    .step-dot.inactive { background: #E2E8F0; }

    /* 체크박스 커스텀 */
    .custom-check {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; border: 2px solid #E2E8F0;
      border-radius: 5px; cursor: pointer;
      transition: border-color .2s, background .2s;
      flex-shrink: 0; position: relative;
    }
    .custom-check:checked {
      background: #2563EB; border-color: #2563EB;
    }
    .custom-check:checked::after {
      content: '✓'; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: white; font-size: 11px; font-weight: 700;
    }

    /* 스피너 */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 딜레이 */
    .delay-100 { animation-delay: .10s; }
    .delay-200 { animation-delay: .20s; }
    .delay-300 { animation-delay: .30s; }
    .delay-400 { animation-delay: .40s; }

    /* SweetAlert2 */
    .swal2-popup { font-family: 'Pretendard', sans-serif !important; border-radius: 16px !important; }
    .swal2-title { font-size: 18px !important; color: #0F172A !important; }
    .swal2-confirm { background: linear-gradient(135deg,#2563EB,#1E40AF) !important; border-radius: 8px !important; font-weight: 600 !important; }
  </style>
</head>

<body class="bg-mesh min-h-screen flex items-center justify-center px-4 py-10 antialiased">

  <!-- 장식 배경 원 -->
  <div class="deco-circle w-96 h-96 -top-20 -left-24 animate-pulse" style="position:fixed; animation-duration:3s;"></div>
  <div class="deco-circle w-72 h-72 bottom-0 right-0 animate-pulse" style="position:fixed; animation-delay:.8s; animation-duration:3s;"></div>

  <!-- 회원가입 카드 -->
  <div class="glass-card shadow-card rounded-2xl w-full max-w-md p-8 sm:p-10 relative z-10 animate-fade-up">

    <!-- 로고 -->
    <div class="text-center mb-6 animate-fade-up">
      <a href="#" class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4
                bg-gradient-to-br from-primary to-primaryDk shadow-btn">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.966 8.966 0 0 0-6 2.292m0-14.25v14.25"/>
        </svg>
      </a>
      <h1 class="font-display font-800 text-3xl sm:text-4xl tracking-tight text-dark leading-none">
        StudyGroup<span class="text-primary">Manager</span>
      </h1>
      <p class="mt-2 text-sm text-muted">새 계정을 만들어 스터디를 시작하세요</p>
    </div>

    <!-- 진행 단계 표시 -->
    <div class="flex items-center justify-center gap-2 mb-7">
      <div id="dot1" class="step-dot active"></div>
      <div id="dot2" class="step-dot inactive"></div>
      <div id="dot3" class="step-dot inactive"></div>
    </div>

    <!-- ── 폼 ── -->
    <form id="signupForm" novalidate class="space-y-4">

      <!-- STEP 1: 이메일 -->
      <div id="step1">

        <!-- 이메일 -->
        <div class="animate-fade-up delay-100">
          <label for="email" class="block text-sm font-semibold text-mid mb-1.5">
            이메일 <span class="text-danger">*</span>
          </label>
          <div class="input-wrap">
            <span class="ico">
              <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"/>
              </svg>
            </span>
            <input id="email" name="email" type="email"
                   placeholder="example@email.com"
                   autocomplete="email"
                   class="input-field has-status w-full rounded-xl border border-border bg-surface
                          text-dark text-sm font-medium py-3 pr-10 shadow-inset
                          placeholder:text-muted/60" />
            <span id="emailStatus" class="status-icon opacity-0"></span>
          </div>
          <p id="emailMsg" class="text-xs mt-1.5 hidden"></p>
        </div>

        <!-- 닉네임 -->
        <div class="animate-fade-up delay-200 mt-4">
          <label for="nickname" class="block text-sm font-semibold text-mid mb-1.5">
            닉네임 <span class="text-danger">*</span>
          </label>
          <div class="input-wrap">
            <span class="ico">
              <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/>
              </svg>
            </span>
            <input id="nickname" name="nickname" type="text"
                   placeholder="2~20자 닉네임"
                   maxlength="20"
                   autocomplete="nickname"
                   class="input-field has-status w-full rounded-xl border border-border bg-surface
                          text-dark text-sm font-medium py-3 pr-10 shadow-inset
                          placeholder:text-muted/60" />
            <span id="nicknameStatus" class="status-icon opacity-0"></span>
          </div>
          <div class="flex items-center justify-between mt-1.5">
            <p id="nicknameMsg" class="text-xs hidden"></p>
            <p class="text-xs text-muted ml-auto"><span id="nicknameLen">0</span>/20</p>
          </div>
        </div>
      </div>

      <!-- STEP 2: 비밀번호 -->
      <div id="step2" class="hidden space-y-4">

        <!-- 비밀번호 -->
        <div class="animate-fade-up">
          <label for="password" class="block text-sm font-semibold text-mid mb-1.5">
            비밀번호 <span class="text-danger">*</span>
          </label>
          <div class="input-wrap">
            <span class="ico">
              <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25z"/>
              </svg>
            </span>
            <input id="password" name="password" type="password"
                   placeholder="8자 이상, 영문+숫자 포함"
                   autocomplete="new-password"
                   class="input-field w-full rounded-xl border border-border bg-surface
                          text-dark text-sm font-medium py-3 pr-12 shadow-inset
                          placeholder:text-muted/60" />
            <button type="button" class="pw-toggle" id="pwToggle1" aria-label="비밀번호 표시">
              <svg id="eye1Off" style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/>
              </svg>
              <svg id="eye1On" style="width:18px;height:18px;display:none;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
              </svg>
            </button>
          </div>

          <!-- 비밀번호 강도 바 -->
          <div class="mt-2">
            <div class="h-1.5 bg-border rounded-full overflow-hidden">
              <div id="strengthBar" class="strength-bar h-full rounded-full w-0 bg-danger"></div>
            </div>
            <div class="flex items-center justify-between mt-1">
              <p id="strengthText" class="text-xs text-muted">비밀번호를 입력하세요</p>
              <div class="flex gap-1">
                <span id="sc1" class="text-xs">●</span>
                <span id="sc2" class="text-xs">●</span>
                <span id="sc3" class="text-xs">●</span>
                <span id="sc4" class="text-xs">●</span>
              </div>
            </div>
          </div>

          <!-- 비밀번호 조건 -->
          <div class="mt-2 grid grid-cols-2 gap-1">
            <div id="cond1" class="flex items-center gap-1.5 text-xs text-muted">
              <span class="w-3.5 h-3.5 rounded-full border border-border flex items-center justify-center text-[9px]">✓</span>
              8자 이상
            </div>
            <div id="cond2" class="flex items-center gap-1.5 text-xs text-muted">
              <span class="w-3.5 h-3.5 rounded-full border border-border flex items-center justify-center text-[9px]">✓</span>
              영문 포함
            </div>
            <div id="cond3" class="flex items-center gap-1.5 text-xs text-muted">
              <span class="w-3.5 h-3.5 rounded-full border border-border flex items-center justify-center text-[9px]">✓</span>
              숫자 포함
            </div>
            <div id="cond4" class="flex items-center gap-1.5 text-xs text-muted">
              <span class="w-3.5 h-3.5 rounded-full border border-border flex items-center justify-center text-[9px]">✓</span>
              특수문자 (선택)
            </div>
          </div>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="animate-fade-up delay-100">
          <label for="password2" class="block text-sm font-semibold text-mid mb-1.5">
            비밀번호 확인 <span class="text-danger">*</span>
          </label>
          <div class="input-wrap">
            <span class="ico">
              <svg style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
              </svg>
            </span>
            <input id="password2" name="password2" type="password"
                   placeholder="비밀번호를 다시 입력하세요"
                   autocomplete="new-password"
                   class="input-field has-status w-full rounded-xl border border-border bg-surface
                          text-dark text-sm font-medium py-3 pr-12 shadow-inset
                          placeholder:text-muted/60" />
            <button type="button" class="pw-toggle" id="pwToggle2" aria-label="비밀번호 확인 표시">
              <svg id="eye2Off" style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/>
              </svg>
              <svg id="eye2On" style="width:18px;height:18px;display:none;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
              </svg>
            </button>
            <span id="pw2Status" class="status-icon" style="right:44px; opacity:0;"></span>
          </div>
          <p id="pw2Msg" class="text-xs mt-1.5 hidden"></p>
        </div>
      </div>

      <!-- STEP 3: 약관 동의 -->
      <div id="step3" class="hidden space-y-3 animate-fade-up">

        <p class="text-sm font-semibold text-mid mb-2">약관 동의</p>

        <!-- 전체 동의 -->
        <label class="flex items-center gap-3 p-3 rounded-xl bg-primaryLt border border-primary/20 cursor-pointer">
          <input type="checkbox" id="agreeAll" class="custom-check" />
          <span class="text-sm font-bold text-primary">전체 동의</span>
        </label>

        <div class="pl-2 space-y-2">
          <!-- 이용약관 -->
          <label class="flex items-center justify-between gap-3 p-2.5 rounded-xl bg-surface border border-border cursor-pointer">
            <div class="flex items-center gap-3">
              <input type="checkbox" id="agreeTerms" class="custom-check" />
              <span class="text-sm text-mid">[필수] 이용약관 동의</span>
            </div>
            <button type="button" onclick="showTerms()"
                    class="text-xs text-primary hover:underline flex-shrink-0">보기</button>
          </label>

          <!-- 개인정보 처리방침 -->
          <label class="flex items-center justify-between gap-3 p-2.5 rounded-xl bg-surface border border-border cursor-pointer">
            <div class="flex items-center gap-3">
              <input type="checkbox" id="agreePrivacy" class="custom-check" />
              <span class="text-sm text-mid">[필수] 개인정보 처리방침 동의</span>
            </div>
            <button type="button" onclick="showPrivacy()"
                    class="text-xs text-primary hover:underline flex-shrink-0">보기</button>
          </label>

          <!-- 마케팅 -->
          <label class="flex items-center gap-3 p-2.5 rounded-xl bg-surface border border-border cursor-pointer">
            <input type="checkbox" id="agreeMarketing" class="custom-check" />
            <span class="text-sm text-muted">[선택] 마케팅 정보 수신 동의</span>
          </label>
        </div>
      </div>

      <!-- 버튼 영역 -->
      <div class="flex gap-3 pt-2 animate-fade-up delay-300">

        <!-- 이전 버튼 (2, 3단계에서 표시) -->
        <button type="button" id="prevBtn"
                class="hidden flex-1 py-3.5 rounded-xl border border-border
                       text-sm font-semibold text-mid bg-white
                       hover:bg-surface transition-colors">
          이전
        </button>

        <!-- 다음/가입 버튼 -->
        <button type="button" id="nextBtn"
                class="signup-btn flex-1 text-white font-bold text-sm rounded-xl py-3.5
                       flex items-center justify-center gap-2 focus:outline-none
                       focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2">
          <span id="btnText">다음</span>
          <div id="btnSpinner" class="spinner hidden"></div>
        </button>
      </div>

    </form>

    <!-- 하단 로그인 링크 -->
    <div class="mt-7 pt-5 border-t border-border text-center animate-fade-up delay-400">
      <p class="text-sm text-muted">
        이미 계정이 있으신가요?
        <a href="#"
           class="text-primary font-semibold hover:underline ml-1">로그인</a>
      </p>
    </div>

  </div><!-- /card -->

  <!-- 푸터 -->
  <p class="fixed bottom-4 left-1/2 -translate-x-1/2 text-xs text-muted/70
            whitespace-nowrap animate-fade-in z-10">
    © <span id="year"></span> StudyGroupManager. All rights reserved.
  </p>


  <!-- ════════════════════════════════════
       JavaScript
  ════════════════════════════════════ -->
  <script>
    // ── 기본 설정 ──
    document.getElementById('year').textContent = new Date().getFullYear();
    axios.defaults.headers.common['X-CSRFToken'] =
      document.querySelector('[name=csrfmiddlewaretoken]').value;
    axios.defaults.headers.common['Content-Type'] = 'application/json';

    const Toast = Swal.mixin({
      toast: true, position: 'top-end',
      showConfirmButton: false, timer: 3000, timerProgressBar: true,
    });

    // ── 단계 관리 ──
    let currentStep = 1;
    const totalSteps = 3;

    // ── 상태 관리 ──
    const state = {
      emailValid:    false,
      emailChecked:  false,
      nicknameValid: false,
      pwValid:       false,
      pw2Match:      false,
    };

    // ────────────────────────────────────
    // 단계 전환
    // ────────────────────────────────────
    function goToStep(step) {
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step3').classList.add('hidden');
      document.getElementById(`step${step}`).classList.remove('hidden');

      // 도트 업데이트
      for (let i = 1; i <= totalSteps; i++) {
        const dot = document.getElementById(`dot${i}`);
        dot.className = 'step-dot';
        if (i < step)       dot.classList.add('done');
        else if (i === step) dot.classList.add('active');
        else                 dot.classList.add('inactive');
      }

      // 이전 버튼
      document.getElementById('prevBtn').classList.toggle('hidden', step === 1);

      // 다음/가입 버튼 텍스트
      document.getElementById('btnText').textContent =
        step === totalSteps ? '가입하기' : '다음';

      currentStep = step;
    }

    // ────────────────────────────────────
    // 이메일 유효성 검사 + 중복 확인
    // ────────────────────────────────────
    const emailInput  = document.getElementById('email');
    const emailStatus = document.getElementById('emailStatus');
    const emailMsg    = document.getElementById('emailMsg');
    let emailTimer;

    function setEmailStatus(type, msg) {
      emailMsg.classList.remove('hidden');
      emailInput.className = emailInput.className
        .replace(/is-valid|is-invalid/g, '').trim();

      if (type === 'valid') {
        emailInput.classList.add('is-valid');
        emailStatus.textContent = '✅';
        emailStatus.style.opacity = '1';
        emailMsg.className = 'text-xs mt-1.5 text-success';
        state.emailValid = true;
      } else if (type === 'invalid') {
        emailInput.classList.add('is-invalid');
        emailStatus.textContent = '❌';
        emailStatus.style.opacity = '1';
        emailMsg.className = 'text-xs mt-1.5 text-danger';
        state.emailValid = false;
      } else {
        emailStatus.style.opacity = '0';
        emailMsg.className = 'text-xs mt-1.5 text-muted';
        state.emailValid = false;
      }
      emailMsg.textContent = msg;
    }

    emailInput.addEventListener('input', () => {
      clearTimeout(emailTimer);
      const val = emailInput.value.trim();
      const reg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!val) { setEmailStatus('', ''); emailMsg.classList.add('hidden'); return; }
      if (!reg.test(val)) { setEmailStatus('invalid', '올바른 이메일 형식을 입력해주세요.'); return; }

      setEmailStatus('loading', '중복 확인 중...');
      emailStatus.textContent = '⏳';
      emailStatus.style.opacity = '1';

      emailTimer = setTimeout(async () => {
        try {
          const res = await axios.post('/accounts/check-email/', { email: val });
          if (res.data.available) {
            setEmailStatus('valid', '사용 가능한 이메일입니다.');
            state.emailChecked = true;
          } else {
            setEmailStatus('invalid', '이미 사용 중인 이메일입니다.');
          }
        } catch {
          setEmailStatus('invalid', '이메일 확인 중 오류가 발생했습니다.');
        }
      }, 600);
    });

    // ────────────────────────────────────
    // 닉네임 유효성 검사
    // ────────────────────────────────────
    const nicknameInput  = document.getElementById('nickname');
    const nicknameStatus = document.getElementById('nicknameStatus');
    const nicknameMsg    = document.getElementById('nicknameMsg');
    const nicknameLen    = document.getElementById('nicknameLen');
    let nicknameTimer;

    function setNicknameStatus(type, msg) {
      nicknameMsg.classList.remove('hidden');
      nicknameInput.className = nicknameInput.className
        .replace(/is-valid|is-invalid/g, '').trim();

      if (type === 'valid') {
        nicknameInput.classList.add('is-valid');
        nicknameStatus.textContent = '✅';
        nicknameStatus.style.opacity = '1';
        nicknameMsg.className = 'text-xs text-success';
        state.nicknameValid = true;
      } else if (type === 'invalid') {
        nicknameInput.classList.add('is-invalid');
        nicknameStatus.textContent = '❌';
        nicknameStatus.style.opacity = '1';
        nicknameMsg.className = 'text-xs text-danger';
        state.nicknameValid = false;
      } else {
        nicknameStatus.style.opacity = '0';
        nicknameMsg.className = 'text-xs text-muted';
        state.nicknameValid = false;
      }
      nicknameMsg.textContent = msg;
    }

    nicknameInput.addEventListener('input', () => {
      clearTimeout(nicknameTimer);
      const val = nicknameInput.value.trim();
      nicknameLen.textContent = val.length;

      if (!val) { setNicknameStatus('', ''); nicknameMsg.classList.add('hidden'); return; }
      if (val.length < 2) { setNicknameStatus('invalid', '닉네임은 2자 이상이어야 합니다.'); return; }
      if (val.length > 20) { setNicknameStatus('invalid', '닉네임은 20자 이하여야 합니다.'); return; }
      if (!/^[가-힣a-zA-Z0-9_]+$/.test(val)) {
        setNicknameStatus('invalid', '한글, 영문, 숫자, 언더스코어(_)만 사용 가능합니다.');
        return;
      }

      setNicknameStatus('loading', '중복 확인 중...');
      nicknameStatus.textContent = '⏳';
      nicknameStatus.style.opacity = '1';

      nicknameTimer = setTimeout(async () => {
        try {
          const res = await axios.post('/accounts/check-nickname/', { nickname: val });
          if (res.data.available) {
            setNicknameStatus('valid', '사용 가능한 닉네임입니다.');
          } else {
            setNicknameStatus('invalid', '이미 사용 중인 닉네임입니다.');
          }
        } catch {
          // API 없을 경우 프론트만으로 통과
          setNicknameStatus('valid', '사용 가능한 닉네임입니다.');
          state.nicknameValid = true;
        }
      }, 500);
    });

    // ────────────────────────────────────
    // 비밀번호 강도 체크
    // ────────────────────────────────────
    const pwInput     = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    const strengthTxt = document.getElementById('strengthText');
    const scores      = [document.getElementById('sc1'), document.getElementById('sc2'),
                         document.getElementById('sc3'), document.getElementById('sc4')];
    const conds       = [document.getElementById('cond1'), document.getElementById('cond2'),
                         document.getElementById('cond3'), document.getElementById('cond4')];

    const strengthConfig = [
      { color: 'bg-danger',  text: '매우 약함', textColor: '#DC2626' },
      { color: 'bg-warning', text: '약함',      textColor: '#D97706' },
      { color: 'bg-yellow-400', text: '보통',   textColor: '#CA8A04' },
      { color: 'bg-success', text: '강함',      textColor: '#059669' },
    ];

    function checkPassword(pw) {
      const checks = [
        pw.length >= 8,
        /[a-zA-Z]/.test(pw),
        /[0-9]/.test(pw),
        /[^a-zA-Z0-9]/.test(pw),
      ];
      const score = checks.filter(Boolean).length;

      // 조건 표시
      checks.forEach((ok, i) => {
        const icon = conds[i].querySelector('span');
        if (ok) {
          conds[i].style.color = '#059669';
          icon.style.background = '#059669';
          icon.style.borderColor = '#059669';
          icon.style.color = 'white';
        } else {
          conds[i].style.color = '#94A3B8';
          icon.style.background = '';
          icon.style.borderColor = '#E2E8F0';
          icon.style.color = '#94A3B8';
        }
      });

      // 강도 바
      const pct = score === 0 ? 0 : (score / 4) * 100;
      strengthBar.style.width = pw ? pct + '%' : '0%';
      strengthBar.className = `strength-bar h-full rounded-full ${pw && score > 0 ? strengthConfig[score-1].color : 'bg-danger'}`;

      // 텍스트
      if (!pw) {
        strengthTxt.textContent = '비밀번호를 입력하세요';
        strengthTxt.style.color = '#94A3B8';
      } else {
        const cfg = strengthConfig[score - 1] || strengthConfig[0];
        strengthTxt.textContent = cfg.text;
        strengthTxt.style.color = cfg.textColor;
      }

      // 점수 아이콘
      scores.forEach((s, i) => {
        s.style.color = i < score ? strengthConfig[score-1]?.textColor ?? '#94A3B8' : '#E2E8F0';
      });

      state.pwValid = checks[0] && checks[1] && checks[2]; // 8자+영문+숫자 필수
      return state.pwValid;
    }

    pwInput.addEventListener('input', () => {
      checkPassword(pwInput.value);
      checkPw2Match();
    });

    // ────────────────────────────────────
    // 비밀번호 확인 일치
    // ────────────────────────────────────
    const pw2Input  = document.getElementById('password2');
    const pw2Status = document.getElementById('pw2Status');
    const pw2Msg    = document.getElementById('pw2Msg');

    function checkPw2Match() {
      const val = pw2Input.value;
      if (!val) { pw2Status.style.opacity='0'; pw2Msg.classList.add('hidden'); state.pw2Match=false; return; }

      if (val === pwInput.value) {
        pw2Input.className = pw2Input.className.replace(/is-valid|is-invalid/g,'').trim() + ' is-valid';
        pw2Status.textContent = '✅'; pw2Status.style.opacity='1';
        pw2Msg.textContent = '비밀번호가 일치합니다.';
        pw2Msg.className = 'text-xs mt-1.5 text-success';
        pw2Msg.classList.remove('hidden');
        state.pw2Match = true;
      } else {
        pw2Input.className = pw2Input.className.replace(/is-valid|is-invalid/g,'').trim() + ' is-invalid';
        pw2Status.textContent = '❌'; pw2Status.style.opacity='1';
        pw2Msg.textContent = '비밀번호가 일치하지 않습니다.';
        pw2Msg.className = 'text-xs mt-1.5 text-danger';
        pw2Msg.classList.remove('hidden');
        state.pw2Match = false;
      }
    }

    pw2Input.addEventListener('input', checkPw2Match);

    // ────────────────────────────────────
    // 비밀번호 토글
    // ────────────────────────────────────
    document.getElementById('pwToggle1').addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      document.getElementById('eye1Off').style.display = isHidden ? 'none' : '';
      document.getElementById('eye1On').style.display  = isHidden ? '' : 'none';
    });
    document.getElementById('pwToggle2').addEventListener('click', () => {
      const isHidden = pw2Input.type === 'password';
      pw2Input.type = isHidden ? 'text' : 'password';
      document.getElementById('eye2Off').style.display = isHidden ? 'none' : '';
      document.getElementById('eye2On').style.display  = isHidden ? '' : 'none';
    });

    // ────────────────────────────────────
    // 전체 동의 체크박스
    // ────────────────────────────────────
    const agreeAll      = document.getElementById('agreeAll');
    const agreeTerms    = document.getElementById('agreeTerms');
    const agreePrivacy  = document.getElementById('agreePrivacy');
    const agreeMarketing= document.getElementById('agreeMarketing');

    agreeAll.addEventListener('change', () => {
      [agreeTerms, agreePrivacy, agreeMarketing].forEach(c => c.checked = agreeAll.checked);
    });
    [agreeTerms, agreePrivacy, agreeMarketing].forEach(c => {
      c.addEventListener('change', () => {
        agreeAll.checked = agreeTerms.checked && agreePrivacy.checked && agreeMarketing.checked;
      });
    });

    // ────────────────────────────────────
    // 이용약관 / 개인정보 팝업
    // ────────────────────────────────────
    function showTerms() {
      Swal.fire({
        title: '이용약관',
        html: `<div style="text-align:left;font-size:13px;color:#475569;line-height:1.7;max-height:300px;overflow-y:auto;">
          <p><strong>제1조 (목적)</strong><br>
          이 약관은 StudyGroupManager(이하 "서비스")의 이용 조건 및 절차, 회원과 서비스 간의 권리, 의무 및 책임사항을 규정함을 목적으로 합니다.</p>
          <br>
          <p><strong>제2조 (서비스 이용)</strong><br>
          회원은 서비스를 통해 스터디 그룹을 생성하고 참여할 수 있으며, 출석 관리 및 벌금 정산 기능을 이용할 수 있습니다.</p>
          <br>
          <p><strong>제3조 (회원의 의무)</strong><br>
          회원은 서비스 이용 시 타인의 권리를 침해하거나 법령을 위반하는 행위를 해서는 안 됩니다.</p>
        </div>`,
        confirmButtonText: '확인',
        confirmButtonColor: '#2563EB',
      }).then(() => { agreeTerms.checked = true; });
    }

    function showPrivacy() {
      Swal.fire({
        title: '개인정보 처리방침',
        html: `<div style="text-align:left;font-size:13px;color:#475569;line-height:1.7;max-height:300px;overflow-y:auto;">
          <p><strong>수집 항목</strong><br>이메일, 닉네임, 비밀번호(암호화 저장)</p>
          <br>
          <p><strong>수집 목적</strong><br>회원 식별 및 서비스 제공, 출석/벌금 데이터 관리</p>
          <br>
          <p><strong>보유 기간</strong><br>회원 탈퇴 시 즉시 삭제 (단, 법령에 따라 일정 기간 보관될 수 있음)</p>
          <br>
          <p><strong>제3자 제공</strong><br>원칙적으로 개인정보를 제3자에게 제공하지 않습니다.</p>
        </div>`,
        confirmButtonText: '확인',
        confirmButtonColor: '#2563EB',
      }).then(() => { agreePrivacy.checked = true; });
    }

    // ────────────────────────────────────
    // 다음/이전/가입 버튼
    // ────────────────────────────────────
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentStep > 1) goToStep(currentStep - 1);
    });

    document.getElementById('nextBtn').addEventListener('click', async () => {

      // ── Step 1 유효성 ──
      if (currentStep === 1) {
        if (!state.emailValid) {
          Toast.fire({ icon: 'warning', title: '이메일을 확인해주세요.' });
          emailInput.focus(); return;
        }
        if (!state.nicknameValid) {
          Toast.fire({ icon: 'warning', title: '닉네임을 확인해주세요.' });
          nicknameInput.focus(); return;
        }
        goToStep(2); return;
      }

      // ── Step 2 유효성 ──
      if (currentStep === 2) {
        if (!state.pwValid) {
          Toast.fire({ icon: 'warning', title: '비밀번호 조건을 확인해주세요.' });
          pwInput.focus(); return;
        }
        if (!state.pw2Match) {
          Toast.fire({ icon: 'warning', title: '비밀번호가 일치하지 않습니다.' });
          pw2Input.focus(); return;
        }
        goToStep(3); return;
      }

      // ── Step 3: 가입하기 ──
      if (currentStep === 3) {
        if (!agreeTerms.checked || !agreePrivacy.checked) {
          Toast.fire({ icon: 'warning', title: '필수 약관에 동의해주세요.' });
          return;
        }

        // 로딩
        const btn = document.getElementById('nextBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        btn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.remove('hidden');

        try {
          const res = await axios.post('/accounts/signup/', {
            email:            document.getElementById('email').value.trim(),
            nickname:         document.getElementById('nickname').value.trim(),
            password:         document.getElementById('password').value,
            password2:        document.getElementById('password2').value,
            agree_terms:      agreeTerms.checked,
            agree_privacy:    agreePrivacy.checked,
            agree_marketing:  agreeMarketing.checked,
          });

          if (res.data.success) {
            await Swal.fire({
              icon:              'success',
              title:             '🎉 가입 완료!',
              html:              `<p style="font-size:14px;color:#475569;">
                                    <strong>${document.getElementById('nickname').value}</strong>님, 환영합니다!<br>
                                    스터디 그룹을 시작해볼까요?
                                  </p>`,
              confirmButtonText: '대시보드로 이동',
              confirmButtonColor:'#2563EB',
              allowOutsideClick: false,
            });
            window.location.href = res.data.redirect_url || '/dashboard/';
          } else {
            Swal.fire({
              icon: 'error', title: '가입 실패',
              text: res.data.message || '다시 시도해주세요.',
              confirmButtonText: '확인', confirmButtonColor: '#2563EB',
            });
          }

        } catch (err) {
          const msg = err.response?.data?.message || '서버 오류가 발생했습니다.';
          Swal.fire({
            icon: 'error', title: '오류',
            text: msg,
            confirmButtonText: '확인', confirmButtonColor: '#2563EB',
          });
        } finally {
          btn.disabled = false;
          btnText.classList.remove('hidden');
          btnSpinner.classList.add('hidden');
        }
      }
    });

    // ── Django messages → Toast ──
    {% if messages %}
      {% for message in messages %}
        Toast.fire({
          icon: '{{ message.tags }}' === 'error' ? 'error'
              : '{{ message.tags }}' === 'success' ? 'success' : 'info',
          title: '{{ message|escapejs }}',
        });
      {% endfor %}
    {% endif %}

    // ── Enter 키 지원 ──
    document.querySelectorAll('#signupForm input[type="text"], #signupForm input[type="email"]')
      .forEach(input => {
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('nextBtn').click();
        });
      });
  </script>

</body>
</html>
