<!-- ══════════════════ LEFT SIDEBAR ══════════════════ -->
<aside id="sidebar" class="w-[260px] flex-shrink-0 bg-white border-r border-slate-100 flex flex-col" style="min-height:100vh;">

  <!-- 로고 -->

        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">

               C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253
               v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
      </div>
      <div>
        <p class="font-bold text-slate-800 text-sm leading-tight group-hover:text-blue-700 transition-colors">StudyGroup</p>
        <p class="text-xs font-semibold transition-colors" style="color:#1055e8;">Manager</p>
      </div>
    </a>
    <!-- 모바일 닫기 -->
