{% load i18n %}
{# 다크모드 토글 + 헤더 공통 함수 — inc_header.html 을 사용하는 모든 페이지에 </body> 직전 include #}

<style>
/* ═══════════════════════════════════════════════════
   DARK MODE — 레이아웃 전반 오버라이드
═══════════════════════════════════════════════════ */

/* CSS 변수 보정 (inc_header.html 에서 참조) */
html[data-theme="dark"] { --text-heading: #f1f5f9; }

/* 최상위 컨테이너 */
html[data-theme="dark"] body { background: #0f172a !important; }
html[data-theme="dark"] #mainContainer { background: #1e293b !important; }

/* ── 사이드바 (inc_left.html) ───────────────────── */
html[data-theme="dark"] #sidebar {
  background: #0f172a !important;
  border-color: #1e293b !important;
}
html[data-theme="dark"] #sidebar .border-b,
html[data-theme="dark"] #sidebar .border-r { border-color: #1e293b !important; }
html[data-theme="dark"] #sidebar .nav-link:not(.active) { color: #94a3b8 !important; }
html[data-theme="dark"] #sidebar .nav-link:not(.active):hover {
  background: #1a2d52 !important; color: #c7d7fb !important;
}
html[data-theme="dark"] #sidebar p { color: #94a3b8 !important; }
html[data-theme="dark"] #sidebar .font-bold { color: #e2e8f0 !important; }
/* AI 위젯 */
html[data-theme="dark"] #sidebar .mx-4.mb-5 {
  background: #1a2d52 !important; border-color: #2a4080 !important;
}
html[data-theme="dark"] #sidebar .mx-4.mb-5 p { color: #c7d7fb !important; }

/* ── 헤더 (inc_header.html) ─────────────────────── */
html[data-theme="dark"] header {
  background: #1e293b !important;
  border-color: #334155 !important;
}
html[data-theme="dark"] header input {
  background: #0f172a !important;
  border-color: #334155 !important;
  color: #e2e8f0 !important;
}
html[data-theme="dark"] header input::placeholder { color: #475569 !important; }
html[data-theme="dark"] header .text-slate-500,
html[data-theme="dark"] header .text-slate-400 { color: #64748b !important; }
html[data-theme="dark"] .toggle-slider { background: #334155 !important; }

/* ── 콘텐츠 영역 ────────────────────────────────── */
html[data-theme="dark"] .bg-slate-50 { background: #1e293b !important; }
html[data-theme="dark"] .bg-white    { background: #1e293b !important; }

/* 카드 테두리 */
html[data-theme="dark"] .border-slate-100,
html[data-theme="dark"] .border-slate-200 { border-color: #334155 !important; }
html[data-theme="dark"] .divide-y > * + * { border-color: #334155 !important; }
html[data-theme="dark"] .border-b,
html[data-theme="dark"] .border-t { border-color: #334155 !important; }

/* 텍스트 */
html[data-theme="dark"] .text-slate-800 { color: #f1f5f9 !important; }
html[data-theme="dark"] .text-slate-700 { color: #e2e8f0 !important; }
html[data-theme="dark"] .text-slate-600 { color: #cbd5e1 !important; }
html[data-theme="dark"] .text-slate-500 { color: #94a3b8 !important; }
html[data-theme="dark"] .text-slate-400 { color: #64748b !important; }

/* 입력 요소 */
html[data-theme="dark"] input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
html[data-theme="dark"] textarea,
html[data-theme="dark"] select {
  background: #0f172a !important;
  border-color: #334155 !important;
  color: #e2e8f0 !important;
}
html[data-theme="dark"] input::placeholder,
html[data-theme="dark"] textarea::placeholder { color: #475569 !important; }

/* 테이블 */
html[data-theme="dark"] thead tr th {
  background: #0f172a !important;
  color: #94a3b8 !important;
  border-color: #334155 !important;
}
html[data-theme="dark"] tbody tr:hover { background: #243858 !important; }

/* 배경이 slate-50/100 인 인라인 스타일 섹션 */
html[data-theme="dark"] [style*="background:#f8fafc"],
html[data-theme="dark"] [style*="background: #f8fafc"],
html[data-theme="dark"] [style*="background:#f1f5f9"],
html[data-theme="dark"] [style*="background: #f1f5f9"] {
  background: #1e293b !important;
}

/* SweetAlert2 */
html[data-theme="dark"] .swal2-popup {
  background: #1e293b !important;
  border: 1px solid #334155;
}
html[data-theme="dark"] .swal2-title   { color: #f1f5f9 !important; }
html[data-theme="dark"] .swal2-html-container { color: #94a3b8 !important; }
html[data-theme="dark"] .swal2-input,
html[data-theme="dark"] .swal2-textarea,
html[data-theme="dark"] .swal2-select {
  background: #0f172a !important;
  border-color: #334155 !important;
  color: #e2e8f0 !important;
}
</style>

<script>
// ═══════════════════════════════════════════════════
// 다크모드 토글 초기화 (toggle 체크박스 이벤트 연결)
// ═══════════════════════════════════════════════════
(function() {
  const toggle       = document.getElementById('darkToggle');
  const toggleMobile = document.getElementById('darkToggleMobile');
  const html         = document.documentElement;

  const saved       = localStorage.getItem('sgm-dark-mode');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark      = saved !== null ? saved === 'true' : prefersDark;

  function applyTheme(dark) {
    if (dark) html.setAttribute('data-theme', 'dark');
    else      html.removeAttribute('data-theme');
    if (toggle)       toggle.checked       = dark;
    if (toggleMobile) toggleMobile.checked = dark;
  }

  function onToggleChange() {
    const dark = this.checked;
    localStorage.setItem('sgm-dark-mode', String(dark));
    applyTheme(dark);
  }

  if (toggle)       toggle.addEventListener('change', onToggleChange);
  if (toggleMobile) toggleMobile.addEventListener('change', onToggleChange);

  applyTheme(isDark);
})();

// ═══════════════════════════════════════════════════
// 헤더 공통 함수 — 각 페이지에 이미 정의된 경우 덮어쓰지 않음
// ═══════════════════════════════════════════════════

// 로그아웃
function _getCsrf() {
  return document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
}
function _doLogout() {
  // Django 5.x: 로그아웃은 POST + CSRF 필요
  const form  = document.createElement('form');
  form.method = 'POST';
  form.action = '/accounts/logout/';
  const inp   = document.createElement('input');
  inp.type    = 'hidden';
  inp.name    = 'csrfmiddlewaretoken';
  inp.value   = _getCsrf();
  form.appendChild(inp);
  document.body.appendChild(form);
  form.submit();
}

window.handleLogout = window.handleLogout || function() {
  if (typeof Swal === 'undefined') {
    if (confirm('로그아웃 하시겠습니까?')) _doLogout();
    return;
  }
  Swal.fire({
    title: '로그아웃',
    text: '정말 로그아웃 하시겠습니까?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: '로그아웃',
    cancelButtonText: '취소',
    confirmButtonColor: '#1258fc',
  }).then(r => {
    if (r.isConfirmed) _doLogout();
  });
};

// 알림 팝업
window.openNotifications = window.openNotifications || function() {
  if (typeof Swal === 'undefined') return;
  Swal.fire({
    title: '알림', width: 400,
    confirmButtonText: '확인', confirmButtonColor: '#1258fc',
    html: `<div class="text-sm text-slate-400 py-4 text-center">새 알림이 없습니다.</div>`,
  });
  document.getElementById('notiBadge')?.classList.add('hidden');
};

// 헤더 검색
window.handleSearch = window.handleSearch || function(q) {
  if (q && q.trim()) window.location.href = '/groups/?q=' + encodeURIComponent(q.trim());
};

// 그룹 만들기 모달
window.openCreateGroupModal = window.openCreateGroupModal || function() {
  if (typeof Swal === 'undefined') return;
  Swal.fire({
    title: '새 스터디 그룹 만들기',
    width: 520,
    showCancelButton: true,
    confirmButtonText: '그룹 생성',
    cancelButtonText: '취소',
    confirmButtonColor: '#1258fc',
    html: `
      <div class="space-y-4 text-left" style="margin-top:8px;">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">그룹 이름 *</label>
          <input id="cg-name" type="text" maxlength="100" placeholder="예: 토익 900점 스터디"
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" style="outline:none;font-family:Pretendard,sans-serif;">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">분야 *</label>
            <select id="cg-category" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" style="outline:none;font-family:Pretendard,sans-serif;">
              <option value="dev">개발 / 프로그래밍</option>
              <option value="lang">어학 / 외국어</option>
              <option value="job">취업 / 자격증</option>
              <option value="selfdev">자기계발</option>
              <option value="etc">기타</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">최대 정원 *</label>
            <input id="cg-max" type="number" min="2" max="50" value="8" placeholder="2~50명"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" style="outline:none;font-family:Pretendard,sans-serif;">
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">그룹 소개</label>
          <textarea id="cg-desc" rows="3" placeholder="그룹 목표와 운영 방식을 소개해 주세요."
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" style="outline:none;resize:none;font-family:Pretendard,sans-serif;"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">결석 벌금 (원)</label>
            <input id="cg-absent-fee" type="number" min="0" value="5000"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" style="outline:none;font-family:Pretendard,sans-serif;">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">지각 벌금 (원)</label>
            <input id="cg-late-fee" type="number" min="0" value="2000"
              class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" style="outline:none;font-family:Pretendard,sans-serif;">
          </div>
        </div>
      </div>`,
    preConfirm: () => {
      const name = document.getElementById('cg-name').value.trim();
      if (!name) { Swal.showValidationMessage('그룹 이름을 입력해 주세요.'); return false; }
      const max = parseInt(document.getElementById('cg-max').value);
      if (isNaN(max) || max < 2 || max > 50) { Swal.showValidationMessage('정원은 2~50명 사이로 입력해 주세요.'); return false; }
      return {
        name, max_members: max,
        category:    document.getElementById('cg-category').value,
        description: document.getElementById('cg-desc').value.trim(),
        absent_fee:  parseInt(document.getElementById('cg-absent-fee').value) || 0,
        late_fee:    parseInt(document.getElementById('cg-late-fee').value)   || 0,
        is_public:   true,
      };
    },
  }).then(async result => {
    if (!result.isConfirmed) return;
    try {
      Swal.fire({ title: '그룹 생성 중...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const { data } = await axios.post('/groups/create/', result.value);
      const r2 = await Swal.fire({
        icon: 'success', title: '그룹 생성 완료!',
        text: `"${result.value.name}" 그룹이 생성되었습니다.`,
        confirmButtonText: '그룹으로 이동',
        showCancelButton: true, cancelButtonText: '계속 머물기',
        confirmButtonColor: '#1258fc',
      });
      if (r2.isConfirmed) window.location.href = `/groups/${data.id}/`;
    } catch (e) {
      Swal.fire({ icon: 'error', title: '오류 발생', text: e.response?.data?.message || '그룹 생성에 실패했습니다.', confirmButtonColor: '#1258fc' });
    }
  });
};

// 사이드바 열기/닫기 (모바일)
window.openSidebar = window.openSidebar || function() {
  document.getElementById('sidebar')?.classList.add('open');
  const overlay = document.getElementById('sidebarOverlay');
  if (overlay) { overlay.classList.add('open'); overlay.classList.add('show'); }
  document.body.style.overflow = 'hidden';
};

window.closeSidebar = window.closeSidebar || function() {
  document.getElementById('sidebar')?.classList.remove('open');
  const overlay = document.getElementById('sidebarOverlay');
  if (overlay) { overlay.classList.remove('open'); overlay.classList.remove('show'); }
  document.body.style.overflow = '';
};
</script>
