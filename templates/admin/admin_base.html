<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>{% block title %}관리자{% endblock %} — StudyGroupManager</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.6/sweetalert2.all.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.6/sweetalert2.min.css">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  * { font-family: 'Pretendard', -apple-system, sans-serif; box-sizing: border-box; }
  body { background: #f1f5f9; }
  .admin-layout { display: flex; min-height: 100vh; }
  .admin-main { flex: 1; margin-left: 256px; min-width: 0; display: flex; flex-direction: column; }
  @media (max-width: 1024px) { .admin-main { margin-left: 0; } }
  .swal2-popup { font-family: 'Pretendard', sans-serif !important; border-radius: 16px !important; }
  .swal2-confirm { background: linear-gradient(135deg,#1A3C5E,#2E86AB) !important; border-radius: 8px !important; font-weight: 600 !important; }
  {% block extra_style %}{% endblock %}
</style>
</head>
<body>
<div class="admin-layout">
  {% include 'admin/inc_left.html' %}
  <div class="admin-main">
    {% include 'admin/inc_top.html' %}
    <main class="flex-1 p-5 lg:p-6">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script>
  axios.defaults.headers.common['X-CSRFToken'] =
    document.querySelector('meta[name="csrf-token"]')?.content || '';
  axios.defaults.headers.common['Content-Type'] = 'application/json';
  const Toast = Swal.mixin({
    toast: true, position: 'top-end',
    showConfirmButton: false, timer: 3000, timerProgressBar: true,
  });
  function toggleSidebar() {
    document.getElementById('adminSidebar')?.classList.toggle('open');
    document.getElementById('sidebarOverlay')?.classList.toggle('show');
  }
</script>
{% block extra_script %}{% endblock %}
</body>
</html>
