{% extends 'admin/admin_base.html' %}
{% block title %}서비스통계{% endblock %}
{% block content %}
<div class="max-w-4xl">

  <!-- 배너 -->
  <div class="rounded-2xl overflow-hidden mb-5"
       style="background:#111111; padding:20px 24px;">
    <h1 class="text-lg font-bold text-white">서비스통계</h1>
    <p class="text-sm mt-0.5" style="color:rgba(255,255,255,.6);">서비스 사용 통계를 확인합니다.</p>
  </div>

  <!-- 준비 중 안내 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-10 text-center">
    <div class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center"
         style="background:linear-gradient(135deg,#f0f0f0,#e0e0e0);">
      <svg class="w-7 h-7" style="color:#333333;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z"/>
      </svg>
    </div>
    <h2 class="text-base font-bold text-slate-800 mb-1">서비스통계 준비 중</h2>
    <p class="text-sm text-slate-400 mb-5">이 기능은 현재 개발 중입니다.</p>
    <a href="{% url 'admin_dashboard' %}"
       class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition-all"
       style="background:#111111;"
       onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
      ← 대시보드로 돌아가기
    </a>
  </div>
</div>
{% endblock %}
