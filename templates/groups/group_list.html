<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 그룹 — StudyGroupManager</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   '#2563EB', primaryDk: '#1E40AF', primaryLt: '#DBEAFE',
            success:   '#059669', successLt: '#D1FAE5',
            warning:   '#D97706', warningLt: '#FEF3C7',
            danger:    '#DC2626', dangerLt:  '#FEE2E2',
            purple:    '#7C3AED', purpleLt:  '#EDE9FE',
            surface:   '#F8FAFC', muted: '#94A3B8', border: '#E2E8F0',
            dark:      '#0F172A', mid:   '#334155',
          },
          fontFamily: {
            sans:    ['Pretendard', 'sans-serif'],
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          animation: {
            'fade-up':  'fadeUp .5s cubic-bezier(.22,1,.36,1) both',
            'fade-in':  'fadeIn .35s ease both',
            'scale-in': 'scaleIn .3s cubic-bezier(.22,1,.36,1) both',
          },
          keyframes: {
            fadeUp:  { from:{opacity:0,transform:'translateY(14px)'}, to:{opacity:1,transform:'translateY(0)'} },
            fadeIn:  { from:{opacity:0}, to:{opacity:1} },
            scaleIn: { from:{opacity:0,transform:'scale(.96)'}, to:{opacity:1,transform:'scale(1)'} },
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing:border-box; }
    body { font-family:'Pretendard',sans-serif; background:#F0F5FF; }

    /* 사이드바 */
    .sidebar { transition:transform .3s cubic-bezier(.22,1,.36,1); }
    .nav-link { transition:all .15s ease; }
    .nav-link:hover { background:rgba(37,99,235,.1); color:#2563EB; }
    .nav-link.active { background:rgba(37,99,235,.1); color:#2563EB; border-right:3px solid #2563EB; }

    /* 탭 */
    .tab-btn { transition:all .2s ease; }
    .tab-btn.active {
      color:#2563EB; border-bottom:2px solid #2563EB;
      font-weight:700;
    }

    /* 필터 버튼 */
    .filter-btn { transition:all .2s ease; }
    .filter-btn.active {
      background:#2563EB; color:white;
      border-color:#2563EB;
    }

    /* 그룹 카드 */
    .group-card {
      transition:transform .2s ease, box-shadow .2s ease;
      cursor:pointer;
    }
    .group-card:hover {
      transform:translateY(-3px);
      box-shadow:0 8px 32px rgba(37,99,235,.13);
    }

    /* 출석률 바 */
    .progress-bar { transition:width 1s cubic-bezier(.22,1,.36,1); }

    /* 역할 배지 */
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; }

    /* 검색 입력 */
    .search-input:focus { outline:none; border-color:#2563EB; box-shadow:0 0 0 3px rgba(37,99,235,.12); }

    /* 스크롤바 */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#CBD5E1; border-radius:4px; }

    /* 딜레이 */
    .delay-50  { animation-delay:.05s; }
    .delay-100 { animation-delay:.10s; }
    .delay-150 { animation-delay:.15s; }
    .delay-200 { animation-delay:.20s; }
    .delay-250 { animation-delay:.25s; }
    .delay-300 { animation-delay:.30s; }

    /* SweetAlert2 */
    .swal2-popup { font-family:'Pretendard',sans-serif !important; border-radius:16px !important; }
    .swal2-title { font-size:18px !important; color:#0F172A !important; }
    .swal2-confirm { background:linear-gradient(135deg,#2563EB,#1E40AF) !important; border-radius:8px !important; font-weight:600 !important; }

    @media (min-width:1024px) { .sidebar { transform:translateX(0) !important; } }
    body.sidebar-open { overflow:hidden; }
  </style>
</head>

<body class="min-h-screen antialiased">

<div class="flex min-h-screen">

  <!-- 모바일 오버레이 -->
  <div id="sidebarOverlay"
       class="fixed inset-0 bg-dark/40 z-20 opacity-0 pointer-events-none lg:hidden transition-opacity duration-300"
       onclick="closeSidebar()"></div>

  <!-- ════════════════════════
       사이드바
  ════════════════════════ -->
  <aside id="sidebar"
         class="sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-border
                flex flex-col z-30 -translate-x-full lg:translate-x-0 lg:static lg:z-auto">

    <div class="flex items-center gap-3 px-5 py-5 border-b border-border">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary to-primaryDk flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.966 8.966 0 0 0-6 2.292m0-14.25v14.25"/>
        </svg>
      </div>
      <div>
        <div class="font-display font-800 text-sm text-dark leading-none">StudyGroup</div>
        <div class="font-display font-800 text-sm text-primary leading-none">Manager</div>
      </div>
    </div>

    <div class="flex items-center gap-3 px-5 py-4 border-b border-border bg-surface">
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary to-primaryDk flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
        {{ request.user.username|first|upper|default:"U" }}
      </div>
      <div class="min-w-0">
        <div class="text-sm font-semibold text-dark truncate">{{ request.user.username|default:"사용자" }}</div>
        <div class="text-xs text-muted truncate">{{ request.user.email|default:"" }}</div>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <p class="text-xs font-semibold text-muted uppercase tracking-wider px-3 mb-2">메인</p>
      <a href="{% url 'dashboard' %}" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-mid">
        <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"/></svg>
        대시보드
      </a>

      <p class="text-xs font-semibold text-muted uppercase tracking-wider px-3 mt-4 mb-2">스터디</p>
      <a href="{% url 'group_list' %}" class="nav-link active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-primary">
        <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"/></svg>
        내 그룹
        <span id="myGroupCount" class="ml-auto badge bg-primaryLt text-primary">0</span>
      </a>
      <a href="{% url 'attendance_check' %}" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-mid">
        <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        출석 관리
      </a>
      <a href="#" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-mid">
        <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z"/></svg>
        벌금 관리
      </a>
      <a href="#" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-mid">
        <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 1 1 0-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 0 1-1.44-4.282m3.102.069a18.03 18.03 0 0 1-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 0 1 8.835 2.535M10.34 6.66a23.847 23.847 0 0 1 8.835-2.535m0 0A23.74 23.74 0 0 1 18.795 3c1.167 0 2.315.086 3.435.254m-13.89 3.406a23.927 23.927 0 0 1 3.29-.166c1.02 0 2.024.057 3.009.166m-6.3 0a23.76 23.76 0 0 0-3.29.166m9.3 0a23.76 23.76 0 0 1 3.29.166"/></svg>
        공지사항
      </a>

      <p class="text-xs font-semibold text-muted uppercase tracking-wider px-3 mt-4 mb-2">계정</p>
      <a href="{% url 'profile' %}" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-mid">
        <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
        프로필
      </a>
      <button onclick="confirmLogout()" class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-mid">
        <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"/></svg>
        로그아웃
      </button>
    </nav>

    <div class="px-5 py-4 border-t border-border">
      <p class="text-xs text-muted text-center">© <span id="yr"></span> StudyGroupManager</p>
    </div>
  </aside>

  <!-- ════════════════════════
       메인 컨텐츠
  ════════════════════════ -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- 헤더 -->
    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur border-b border-border px-4 sm:px-6 py-3">
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <button onclick="openSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-surface transition-colors">
            <svg class="w-5 h-5 text-mid" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
          </button>
          <div>
            <h1 class="font-display font-800 text-lg text-dark">내 그룹</h1>
            <p class="text-xs text-muted hidden sm:block">스터디 그룹을 관리하고 탐색하세요</p>
          </div>
        </div>

        <!-- 헤더 우측 버튼 -->
        <div class="flex items-center gap-2">
          <button onclick="openJoinGroupModal()"
                  class="flex items-center gap-1.5 px-3 py-2 rounded-lg border border-border
                         text-sm font-medium text-mid hover:bg-surface transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z"/></svg>
            <span class="hidden sm:inline">그룹 참여</span>
          </button>
          <button onclick="openCreateGroupModal()"
                  class="flex items-center gap-1.5 px-3 py-2 rounded-lg
                         bg-gradient-to-r from-primary to-primaryDk
                         text-sm font-semibold text-white shadow-sm
                         hover:shadow-md hover:-translate-y-0.5 transition-all">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            <span class="hidden sm:inline">그룹 만들기</span>
          </button>
        </div>
      </div>
    </header>

    <!-- 메인 -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6">

      <!-- ── 탭 메뉴 (내 그룹 / 공개 그룹 탐색) ── -->
      <div class="flex border-b border-border mb-5 animate-fade-in">
        <button id="tab-my"
                onclick="switchTab('my')"
                class="tab-btn active px-5 py-3 text-sm text-mid border-b-2 border-transparent -mb-px">
          내 그룹
          <span id="myTabCount" class="ml-1.5 badge bg-primaryLt text-primary">0</span>
        </button>
        <button id="tab-public"
                onclick="switchTab('public')"
                class="tab-btn px-5 py-3 text-sm text-mid border-b-2 border-transparent -mb-px">
          공개 그룹 탐색
          <span id="publicTabCount" class="ml-1.5 badge bg-surface text-muted">0</span>
        </button>
      </div>

      <!-- ── 검색 + 필터 ── -->
      <div class="space-y-3 mb-5 animate-fade-up">

        <!-- 검색 바 -->
        <div class="relative">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-muted">
            <svg class="w-4.5 h-4.5" style="width:18px;height:18px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
          </span>
          <input id="searchInput" type="text"
                 placeholder="그룹 이름 또는 분야로 검색..."
                 class="search-input w-full pl-10 pr-4 py-2.5 rounded-xl border border-border
                        bg-white text-sm text-dark transition-all
                        placeholder:text-muted/60"/>
        </div>

        <!-- 분야 필터 버튼 -->
        <div class="flex flex-wrap gap-2" id="filterButtons">
          <button onclick="setFilter('')"
                  class="filter-btn active px-4 py-1.5 rounded-full border border-border
                         text-xs font-semibold text-mid bg-white transition-all">
            전체
          </button>
          <button onclick="setFilter('어학')"
                  class="filter-btn px-4 py-1.5 rounded-full border border-border
                         text-xs font-semibold text-mid bg-white">
            📚 어학
          </button>
          <button onclick="setFilter('개발')"
                  class="filter-btn px-4 py-1.5 rounded-full border border-border
                         text-xs font-semibold text-mid bg-white">
            💻 개발
          </button>
          <button onclick="setFilter('취업')"
                  class="filter-btn px-4 py-1.5 rounded-full border border-border
                         text-xs font-semibold text-mid bg-white">
            🎯 취업
          </button>
          <button onclick="setFilter('자격증')"
                  class="filter-btn px-4 py-1.5 rounded-full border border-border
                         text-xs font-semibold text-mid bg-white">
            📜 자격증
          </button>
          <button onclick="setFilter('기타')"
                  class="filter-btn px-4 py-1.5 rounded-full border border-border
                         text-xs font-semibold text-mid bg-white">
            ✨ 기타
          </button>
        </div>
      </div>

      <!-- ── 내 그룹 패널 ── -->
      <div id="panel-my">
        <!-- 결과 수 -->
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm text-muted">
            총 <span id="myResultCount" class="font-semibold text-dark">0</span>개 그룹
          </p>
        </div>

        <!-- 그룹 카드 그리드 -->
        <div id="myGroupGrid"
             class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
          <!-- JS로 렌더링 -->
          <div class="col-span-full flex items-center justify-center py-16 text-muted text-sm">
            <svg class="w-5 h-5 animate-spin mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            불러오는 중...
          </div>
        </div>
      </div>

      <!-- ── 공개 그룹 탐색 패널 ── -->
      <div id="panel-public" class="hidden">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm text-muted">
            총 <span id="publicResultCount" class="font-semibold text-dark">0</span>개 공개 그룹
          </p>
        </div>

        <div id="publicGroupGrid"
             class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
          <div class="col-span-full flex items-center justify-center py-16 text-muted text-sm">
            <svg class="w-5 h-5 animate-spin mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            불러오는 중...
          </div>
        </div>
      </div>

    </main>
  </div>
</div>


<!-- ════════════════════════
     JavaScript
════════════════════════ -->
<script>
  // ── 기본 설정 ──
  document.getElementById('yr').textContent = new Date().getFullYear();
  axios.defaults.headers.common['X-CSRFToken'] =
    document.querySelector('[name=csrfmiddlewaretoken]').value;
  axios.defaults.headers.common['Content-Type'] = 'application/json';

  const Toast = Swal.mixin({
    toast:true, position:'top-end',
    showConfirmButton:false, timer:3000, timerProgressBar:true,
  });

  // ── 상태 ──
  let currentTab    = 'my';
  let currentFilter = '';
  let searchTimer;
  let allMyGroups     = [];
  let allPublicGroups = [];

  // ── 사이드바 ──
  function openSidebar() {
    document.getElementById('sidebar').classList.remove('-translate-x-full');
    document.getElementById('sidebarOverlay').classList.remove('opacity-0','pointer-events-none');
    document.body.classList.add('sidebar-open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('sidebarOverlay').classList.add('opacity-0','pointer-events-none');
    document.body.classList.remove('sidebar-open');
  }

  // ────────────────────────────────────
  // 탭 전환
  // ────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;

    ['my','public'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
      document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== tab);
    });

    // 필터 초기화
    currentFilter = '';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn').classList.add('active');
    document.getElementById('searchInput').value = '';

    applyFilter();
  }

  // ────────────────────────────────────
  // 필터 버튼
  // ────────────────────────────────────
  function setFilter(category) {
    currentFilter = category;
    document.querySelectorAll('.filter-btn').forEach(b => {
      const label = b.textContent.trim().replace(/^[^\s]+\s/, '');
      const isAll = b.textContent.trim() === '전체';
      b.classList.toggle('active',
        (isAll && category === '') || (!isAll && label === category)
      );
    });
    applyFilter();
  }

  // ────────────────────────────────────
  // 검색 입력
  // ────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilter, 300);
  });

  // ────────────────────────────────────
  // 필터 + 검색 적용
  // ────────────────────────────────────
  function applyFilter() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const source = currentTab === 'my' ? allMyGroups : allPublicGroups;

    const filtered = source.filter(g => {
      const matchCat = !currentFilter || g.category === currentFilter;
      const matchQ   = !q || g.name.toLowerCase().includes(q) || g.category.toLowerCase().includes(q);
      return matchCat && matchQ;
    });

    if (currentTab === 'my') {
      renderMyGroups(filtered);
    } else {
      renderPublicGroups(filtered);
    }
  }

  // ────────────────────────────────────
  // 데이터 로드
  // ────────────────────────────────────
  async function loadGroupList() {
    try {
      const res = await axios.get('/groups/api/list/');
      allMyGroups     = res.data.my_groups     ?? [];
      allPublicGroups = res.data.public_groups ?? [];

      document.getElementById('myGroupCount').textContent   = allMyGroups.length;
      document.getElementById('myTabCount').textContent     = allMyGroups.length;
      document.getElementById('publicTabCount').textContent = allPublicGroups.length;

      applyFilter();
    } catch (err) {
      console.error('그룹 목록 로드 실패:', err);
      Toast.fire({ icon:'error', title:'그룹 목록을 불러오지 못했습니다.' });
      renderMyGroups([]);
      renderPublicGroups([]);
    }
  }

  // ────────────────────────────────────
  // 내 그룹 카드 렌더링
  // ────────────────────────────────────
  const categoryColors = {
    '어학':  { bg:'#DBEAFE', text:'#1E40AF', icon:'📚' },
    '개발':  { bg:'#D1FAE5', text:'#065F46', icon:'💻' },
    '취업':  { bg:'#FEF3C7', text:'#92400E', icon:'🎯' },
    '자격증':{ bg:'#EDE9FE', text:'#4C1D95', icon:'📜' },
    '기타':  { bg:'#F1F5F9', text:'#475569', icon:'✨' },
  };

  function renderMyGroups(groups) {
    const grid = document.getElementById('myGroupGrid');
    document.getElementById('myResultCount').textContent = groups.length;

    if (!groups.length) {
      grid.innerHTML = `
        <div class="col-span-full flex flex-col items-center justify-center py-16 text-muted animate-fade-in">
          <div class="w-16 h-16 rounded-2xl bg-primaryLt flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"/>
            </svg>
          </div>
          <p class="text-sm font-semibold text-dark mb-1">참여 중인 그룹이 없어요</p>
          <p class="text-xs text-muted mb-4">새 그룹을 만들거나 초대코드로 참여해보세요</p>
          <div class="flex gap-2">
            <button onclick="openJoinGroupModal()"
                    class="px-4 py-2 rounded-lg border border-border text-xs font-semibold text-mid hover:bg-surface transition-colors">
              초대코드 참여
            </button>
            <button onclick="openCreateGroupModal()"
                    class="px-4 py-2 rounded-lg bg-primary text-white text-xs font-semibold hover:bg-primaryDk transition-colors">
              그룹 만들기
            </button>
          </div>
        </div>`;
      return;
    }

    grid.innerHTML = groups.map((g, i) => {
      const rate   = g.attendance_rate ?? 0;
      const cat    = categoryColors[g.category] ?? categoryColors['기타'];
      const rateColor = rate >= 80 ? '#059669' : rate >= 50 ? '#D97706' : '#DC2626';
      const roleLabel = g.role === 'leader'
        ? `<span class="badge bg-primaryLt text-primary">리더</span>`
        : `<span class="badge" style="background:#F1F5F9;color:#64748B;">멤버</span>`;

      return `
        <div class="group-card bg-white rounded-2xl border border-border p-5 animate-fade-up delay-${Math.min(i*50,300)}"
             onclick="location.href='/groups/${g.id}/'">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
                   style="background:${cat.bg};">
                ${cat.icon}
              </div>
              <div>
                <h3 class="font-bold text-dark text-sm leading-tight">${g.name}</h3>
                <span class="text-xs font-medium" style="color:${cat.text};">${g.category}</span>
              </div>
            </div>
            ${roleLabel}
          </div>

          ${g.description ? `<p class="text-xs text-muted mb-3 line-clamp-2">${g.description}</p>` : ''}

          <!-- 출석률 바 -->
          <div class="mb-3">
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs text-muted">이번달 출석률</span>
              <span class="text-xs font-bold" style="color:${rateColor};">${rate}%</span>
            </div>
            <div class="h-1.5 bg-border rounded-full overflow-hidden">
              <div class="progress-bar h-full rounded-full"
                   style="width:${rate}%; background:${rateColor};"></div>
            </div>
          </div>

          <!-- 하단 정보 -->
          <div class="flex items-center justify-between pt-3 border-t border-border">
            <div class="flex items-center gap-1 text-xs text-muted">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/></svg>
              ${g.member_count}명
            </div>
            ${g.unpaid > 0
              ? `<span class="text-xs font-bold text-danger">미납 ${g.unpaid.toLocaleString()}원</span>`
              : `<span class="text-xs text-success font-medium">미납 없음 ✓</span>`
            }
          </div>
        </div>`;
    }).join('');
  }

  // ────────────────────────────────────
  // 공개 그룹 카드 렌더링
  // ────────────────────────────────────
  function renderPublicGroups(groups) {
    const grid = document.getElementById('publicGroupGrid');
    document.getElementById('publicResultCount').textContent = groups.length;

    if (!groups.length) {
      grid.innerHTML = `
        <div class="col-span-full flex flex-col items-center justify-center py-16 text-muted animate-fade-in">
          <div class="w-16 h-16 rounded-2xl bg-surface flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
            </svg>
          </div>
          <p class="text-sm font-semibold text-dark mb-1">검색 결과가 없어요</p>
          <p class="text-xs text-muted">다른 키워드나 분야로 검색해보세요</p>
        </div>`;
      return;
    }

    grid.innerHTML = groups.map((g, i) => {
      const cat = categoryColors[g.category] ?? categoryColors['기타'];
      const isMember = g.is_member ?? false;

      return `
        <div class="group-card bg-white rounded-2xl border border-border p-5 animate-fade-up delay-${Math.min(i*50,300)}"
             onclick="${isMember ? `location.href='/groups/${g.id}/'` : `joinPublicGroup(${g.id},'${g.name}')`}">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
                   style="background:${cat.bg};">
                ${cat.icon}
              </div>
              <div>
                <h3 class="font-bold text-dark text-sm leading-tight">${g.name}</h3>
                <span class="text-xs font-medium" style="color:${cat.text};">${g.category}</span>
              </div>
            </div>
            ${isMember
              ? `<span class="badge bg-successLt text-success">참여중</span>`
              : `<span class="badge bg-surface text-muted">공개</span>`
            }
          </div>

          ${g.description ? `<p class="text-xs text-muted mb-3 line-clamp-2">${g.description}</p>` : ''}

          <div class="flex items-center justify-between pt-3 border-t border-border">
            <div class="flex items-center gap-1 text-xs text-muted">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/></svg>
              ${g.member_count}명 / ${g.max_members}명
            </div>
            ${!isMember ? `
              <button onclick="event.stopPropagation(); joinPublicGroup(${g.id},'${g.name}')"
                      class="text-xs font-semibold text-primary hover:underline">
                참여하기 →
              </button>` : ''
            }
          </div>
        </div>`;
    }).join('');
  }

  // ────────────────────────────────────
  // 공개 그룹 바로 참여
  // ────────────────────────────────────
  async function joinPublicGroup(groupId, groupName) {
    const result = await Swal.fire({
      icon: 'question',
      title: '그룹 참여',
      html: `<p style="font-size:13px;color:#64748B;"><strong>${groupName}</strong> 그룹에 참여하시겠어요?</p>`,
      confirmButtonText: '참여하기',
      cancelButtonText:  '취소',
      showCancelButton:  true,
      confirmButtonColor:'#2563EB',
      cancelButtonColor: '#94A3B8',
    });
    if (!result.isConfirmed) return;

    try {
      const res = await axios.post('/groups/join/', { group_id: groupId });
      if (res.data.success) {
        Toast.fire({ icon:'success', title:`${groupName} 그룹에 참여했습니다!` });
        loadGroupList();
      }
    } catch (err) {
      Toast.fire({ icon:'error', title: err.response?.data?.message || '참여에 실패했습니다.' });
    }
  }

  // ────────────────────────────────────
  // 그룹 만들기 모달 (SweetAlert2)
  // ────────────────────────────────────
  function openCreateGroupModal() {
    Swal.fire({
      title: '새 그룹 만들기',
      html: `
        <div style="text-align:left;margin-top:8px;">
          <label style="font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:4px;">그룹 이름 *</label>
          <input id="sg-name" type="text" placeholder="예: 토익 900 스터디"
            class="swal2-input" style="margin:0 0 12px;font-family:Pretendard,sans-serif;"/>
          <label style="font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:4px;">분야 *</label>
          <select id="sg-category" class="swal2-input" style="margin:0 0 12px;font-family:Pretendard,sans-serif;">
            <option value="">선택하세요</option>
            <option value="어학">📚 어학</option>
            <option value="개발">💻 개발</option>
            <option value="취업">🎯 취업</option>
            <option value="자격증">📜 자격증</option>
            <option value="기타">✨ 기타</option>
          </select>
          <label style="font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:4px;">최대 정원</label>
          <input id="sg-max" type="number" placeholder="10" min="2" max="50" value="10"
            class="swal2-input" style="margin:0 0 12px;font-family:Pretendard,sans-serif;"/>
          <label style="font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:4px;">벌금 규칙</label>
          <div style="display:flex;gap:8px;margin-bottom:12px;">
            <input id="sg-absent-fee" type="number" placeholder="결석 벌금(원)" min="0" value="5000"
              class="swal2-input" style="margin:0;flex:1;font-family:Pretendard,sans-serif;"/>
            <input id="sg-late-fee" type="number" placeholder="지각 벌금(원)" min="0" value="2000"
              class="swal2-input" style="margin:0;flex:1;font-family:Pretendard,sans-serif;"/>
          </div>
          <label style="font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:4px;">그룹 소개</label>
          <textarea id="sg-desc" placeholder="그룹에 대해 소개해주세요."
            class="swal2-textarea" style="margin:0 0 12px;font-family:Pretendard,sans-serif;height:70px;"></textarea>
          <label style="font-size:13px;font-weight:600;color:#334155;display:block;margin-bottom:4px;">공개 여부</label>
          <select id="sg-public" class="swal2-input" style="margin:0;font-family:Pretendard,sans-serif;">
            <option value="true">🌍 공개 (누구나 탐색 가능)</option>
            <option value="false">🔒 비공개 (초대코드로만 참여)</option>
          </select>
        </div>`,
      confirmButtonText: '그룹 만들기',
      cancelButtonText:  '취소',
      showCancelButton:  true,
      confirmButtonColor:'#2563EB',
      cancelButtonColor: '#94A3B8',
      focusConfirm:      false,
      width:             520,
      preConfirm: async () => {
        const name      = document.getElementById('sg-name').value.trim();
        const category  = document.getElementById('sg-category').value;
        const max       = document.getElementById('sg-max').value || 10;
        const absentFee = document.getElementById('sg-absent-fee').value || 0;
        const lateFee   = document.getElementById('sg-late-fee').value || 0;
        const desc      = document.getElementById('sg-desc').value.trim();
        const isPublic  = document.getElementById('sg-public').value === 'true';

        if (!name)     { Swal.showValidationMessage('그룹 이름을 입력해주세요.'); return false; }
        if (!category) { Swal.showValidationMessage('분야를 선택해주세요.'); return false; }

        Swal.showLoading();
        try {
          const res = await axios.post('/groups/create/', {
            name, category, max_members: max,
            absent_fee: absentFee, late_fee: lateFee,
            description: desc, is_public: isPublic,
          });
          return res.data;
        } catch (err) {
          Swal.showValidationMessage(err.response?.data?.message || '그룹 생성에 실패했습니다.');
          return false;
        }
      }
    }).then(result => {
      if (result.isConfirmed && result.value) {
        Toast.fire({ icon:'success', title:'그룹이 생성되었습니다! 🎉' });
        loadGroupList();
      }
    });
  }

  // ────────────────────────────────────
  // 초대코드로 그룹 참여 모달
  // ────────────────────────────────────
  function openJoinGroupModal() {
    Swal.fire({
      title: '그룹 참여',
      html: `
        <p style="font-size:13px;color:#64748B;margin-bottom:14px;">
          초대 코드를 입력하여 그룹에 참여하세요.
        </p>
        <input id="invite-code" type="text" placeholder="초대 코드 8자리"
          maxlength="8"
          class="swal2-input"
          style="font-family:Pretendard,sans-serif;text-transform:uppercase;
                 letter-spacing:.2em;font-size:20px;font-weight:700;text-align:center;"/>`,
      confirmButtonText: '참여하기',
      cancelButtonText:  '취소',
      showCancelButton:  true,
      confirmButtonColor:'#2563EB',
      cancelButtonColor: '#94A3B8',
      focusConfirm:      false,
      didOpen: () => {
        // 자동 대문자 변환
        document.getElementById('invite-code').addEventListener('input', function() {
          this.value = this.value.toUpperCase();
        });
      },
      preConfirm: async () => {
        const code = document.getElementById('invite-code').value.trim().toUpperCase();
        if (code.length !== 8) {
          Swal.showValidationMessage('초대 코드는 8자리입니다.');
          return false;
        }
        Swal.showLoading();
        try {
          const res = await axios.post('/groups/join/', { invite_code: code });
          return res.data;
        } catch (err) {
          Swal.showValidationMessage(err.response?.data?.message || '유효하지 않은 초대 코드입니다.');
          return false;
        }
      }
    }).then(result => {
      if (result.isConfirmed && result.value) {
        Toast.fire({ icon:'success', title:`${result.value.group_name} 그룹에 참여했습니다!` });
        loadGroupList();
      }
    });
  }

  // ── 로그아웃 ──
  function confirmLogout() {
    Swal.fire({
      icon:'question', title:'로그아웃',
      text:'정말 로그아웃 하시겠어요?',
      confirmButtonText:'로그아웃', cancelButtonText:'취소',
      showCancelButton:true, confirmButtonColor:'#DC2626', cancelButtonColor:'#94A3B8',
    }).then(result => {
      if (result.isConfirmed) window.location.href = '{% url 'login' %}';
    });
  }

  // ── Django messages → Toast ──
  {% if messages %}
    {% for message in messages %}
      Toast.fire({
        icon:'{{ message.tags }}'==='error'?'error':'{{ message.tags }}'==='success'?'success':'info',
        title:'{{ message|escapejs }}',
      });
    {% endfor %}
  {% endif %}

  // ── 초기 로드 ──
  loadGroupList();
</script>

</body>
</html>
