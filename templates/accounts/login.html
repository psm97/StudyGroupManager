<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — StudyGroupManager</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   '#2563EB',
            primaryDk: '#1E40AF',
            primaryLt: '#DBEAFE',
            accent:    '#3B82F6',
            surface:   '#F8FAFC',
            muted:     '#94A3B8',
            border:    '#E2E8F0',
            dark:      '#0F172A',
            mid:       '#334155',
          },
          fontFamily: {
            sans:    ['Pretendard', 'sans-serif'],
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          boxShadow: {
            card:   '0 4px 24px rgba(37,99,235,0.10), 0 1px 4px rgba(15,23,42,0.06)',
            btn:    '0 2px 12px rgba(37,99,235,0.30)',
            btnhov: '0 4px 20px rgba(37,99,235,0.45)',
            inset:  'inset 0 2px 4px rgba(15,23,42,0.04)',
          },
          animation: {
            'fade-up':    'fadeUp .55s cubic-bezier(.22,1,.36,1) both',
            'fade-in':    'fadeIn .4s ease both',
            'pulse-slow': 'pulse 3s ease-in-out infinite',
          },
          keyframes: {
            fadeUp: { from:{opacity:0,transform:'translateY(20px)'}, to:{opacity:1,transform:'translateY(0)'} },
            fadeIn: { from:{opacity:0}, to:{opacity:1} },
          },
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; }

    .bg-mesh {
      background-color: #EFF6FF;
      background-image:
        radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(37,99,235,.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 85%,  rgba(30,64,175,.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(96,165,250,.07) 0%, transparent 70%);
    }
    .deco-circle {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,.15), transparent 70%);
      pointer-events: none;
    }
    .glass-card {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ── 구글 버튼 ── */
    .google-btn {
      transition: background .2s, box-shadow .2s, transform .15s;
      background: #fff;
    }
    .google-btn:hover {
      background: #f1f5f9;
      box-shadow: 0 4px 18px rgba(15,23,42,.12);
      transform: translateY(-2px);
    }
    .google-btn:active { transform: translateY(0); }

    /* ── 관리자 토글 영역 ── */
    .admin-panel {
      max-height: 0; overflow: hidden;
      transition: max-height .45s cubic-bezier(.4,0,.2,1), opacity .3s ease;
      opacity: 0;
    }
    .admin-panel.open {
      max-height: 340px;
      opacity: 1;
    }

    /* ── Input ── */
    .input-field { transition: border-color .2s, box-shadow .2s, background .2s; }
    .input-field:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
      background: #fff;
      outline: none;
    }
    .input-wrap { position: relative; }
    .input-wrap .ico {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #94A3B8; pointer-events: none; transition: color .2s;
    }
    .input-wrap:focus-within .ico { color: #2563EB; }
    .input-wrap input { padding-left: 42px; }

    .pw-toggle {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); cursor: pointer;
      color: #94A3B8; transition: color .2s;
    }
    .pw-toggle:hover { color: #2563EB; }

    /* ── 관리자 로그인 버튼 ── */
    .admin-btn {
      background: linear-gradient(135deg, #334155, #0F172A);
      transition: box-shadow .2s, transform .15s, filter .2s;
    }
    .admin-btn:hover {
      box-shadow: 0 6px 22px rgba(15,23,42,.35);
      transform: translateY(-1px);
      filter: brightness(1.1);
    }
    .admin-btn:active { transform: translateY(0); box-shadow: none; }

    /* ── 링크 ── */
    .link-btn {
      position: relative; font-size: 13px; font-weight: 500;
      color: #64748B; transition: color .2s;
    }
    .link-btn::after {
      content: ''; position: absolute; bottom: -2px; left: 0;
      width: 0; height: 1.5px; background: #2563EB;
      transition: width .25s ease;
    }
    .link-btn:hover { color: #2563EB; }
    .link-btn:hover::after { width: 100%; }

    /* ── 스피너 ── */
    .spinner {
      width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .delay-100 { animation-delay: .10s; }
    .delay-200 { animation-delay: .20s; }
    .delay-300 { animation-delay: .30s; }
    .delay-400 { animation-delay: .40s; }
    .delay-500 { animation-delay: .50s; }

    .swal2-popup { font-family: 'Pretendard', sans-serif !important; border-radius: 16px !important; }
    .swal2-title { font-size: 18px !important; color: #0F172A !important; }
    .swal2-html-container { font-size: 14px !important; color: #475569 !important; }
    .swal2-confirm { background: linear-gradient(135deg,#2563EB,#1E40AF) !important; border-radius: 8px !important; font-weight: 600 !important; }
  </style>
</head>

<body class="bg-mesh min-h-screen flex items-center justify-center px-4 py-10 antialiased">

  <!-- 장식 배경 원 -->
  <div class="deco-circle w-96 h-96 -top-20 -left-24 animate-pulse-slow" style="position:fixed;"></div>
  <div class="deco-circle w-72 h-72 bottom-0 right-0 animate-pulse-slow" style="position:fixed; animation-delay:.8s;"></div>
  <div class="deco-circle w-48 h-48 top-1/2 left-1/4 animate-pulse-slow" style="position:fixed; animation-delay:1.4s; opacity:.5;"></div>

  <!-- ── 로그인 카드 ── -->
  <div class="glass-card shadow-card rounded-2xl w-full max-w-md p-8 sm:p-10 relative z-10 animate-fade-up">

    <!-- 로고 -->
    <div class="text-center mb-8 animate-fade-up">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4
                  bg-gradient-to-br from-primary to-primaryDk shadow-btn">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.966 8.966 0 0 0-6 2.292m0-14.25v14.25"/>
        </svg>
      </div>
      <h1 class="font-display font-800 text-3xl sm:text-4xl tracking-tight text-dark leading-none">
        StudyGroup<span class="text-primary">Manager</span>
      </h1>
      <p class="mt-2 text-sm text-muted">스터디 그룹을 더 스마트하게 관리하세요</p>
    </div>

    <!-- ── 구글 로그인 (메인) ── -->
    <div class="animate-fade-up delay-100">
      <p class="text-center text-xs text-muted mb-4 font-medium tracking-wide uppercase">
        Google 계정으로 시작하기
      </p>

      <a href="#"
        id="googleLoginBtn"
        class="google-btn w-full flex items-center justify-center gap-3
               border border-border rounded-2xl py-4 text-sm font-bold text-dark
               focus:outline-none focus-visible:ring-2 focus-visible:ring-primary shadow-card">
        <!-- 구글 로고 -->
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Google 계정으로 로그인
      </a>

      <!-- 보안 안내 -->
      <p class="text-center text-xs text-muted mt-3 flex items-center justify-center gap-1.5">
        <svg class="w-3.5 h-3.5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
        </svg>
        Google의 보안 인프라로 안전하게 로그인됩니다
      </p>
    </div>

    <!-- ── 구분선 ── -->
    <div class="my-7 animate-fade-up delay-200">
      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-border"></div>
        <span class="text-xs text-muted font-medium">회원가입도 Google로</span>
        <div class="flex-1 h-px bg-border"></div>
      </div>
    </div>

    <!-- ── 회원가입 안내 ── -->
    <div class="bg-primaryLt/50 rounded-xl p-4 text-center animate-fade-up delay-200">
      <p class="text-sm text-primary font-semibold mb-1">처음 방문하셨나요?</p>
      <p class="text-xs text-primary/70 mb-3">Google 계정으로 바로 가입하고 스터디를 시작하세요.</p>
      <a href="{% url 'signup' %}"
        class="inline-flex items-center gap-1.5 text-xs font-bold text-primary hover:text-primaryDk transition-colors">
        회원가입 페이지로 이동
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
        </svg>
      </a>
    </div>

    <!-- ── 관리자 로그인 (접힘) ── -->
    <div class="mt-6 animate-fade-up delay-300">

      <!-- 토글 버튼 -->
      <button type="button" id="adminToggleBtn"
        class="w-full flex items-center justify-between px-4 py-2.5 rounded-xl
               border border-dashed border-slate-300 text-xs font-semibold text-slate-400
               hover:border-slate-400 hover:text-slate-600 hover:bg-slate-50
               transition-all focus:outline-none group">
        <span class="flex items-center gap-2">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/>
          </svg>
          관리자 로그인
        </span>
        <svg id="adminChevron" class="w-3.5 h-3.5 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
        </svg>
      </button>

      <!-- 접힌 패널 -->
      <div class="admin-panel" id="adminPanel">
        <div class="mt-3 p-4 bg-slate-50 rounded-xl border border-slate-200">

          <!-- 관리자 안내 -->
          <div class="flex items-start gap-2 mb-4 p-3 bg-amber-50 rounded-lg border border-amber-100">
            <svg class="w-4 h-4 text-amber-500 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
            </svg>
            <p class="text-xs text-amber-700 leading-relaxed">
              이 영역은 <strong>관리자 전용</strong>입니다.<br>
              일반 사용자는 Google 계정으로 로그인하세요.
            </p>
          </div>

          <form id="adminLoginForm" novalidate class="space-y-3">
            <!-- 이메일 -->
            <div>
              <label for="adminEmail" class="block text-xs font-semibold text-mid mb-1">관리자 이메일</label>
              <div class="input-wrap">
                <span class="ico">
                  <svg style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
                  </svg>
                </span>
                <input id="adminEmail" name="email" type="email"
                  placeholder="admin@studymgr.com" autocomplete="email"
                  class="input-field w-full rounded-xl border border-border bg-white
                         text-dark text-sm font-medium py-2.5 pr-4 shadow-inset
                         placeholder:text-muted/60"/>
              </div>
            </div>

            <!-- 비밀번호 -->
            <div>
              <label for="adminPassword" class="block text-xs font-semibold text-mid mb-1">비밀번호</label>
              <div class="input-wrap">
                <span class="ico">
                  <svg style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
                  </svg>
                </span>
                <input id="adminPassword" name="password" type="password"
                  placeholder="비밀번호를 입력하세요" autocomplete="current-password"
                  class="input-field w-full rounded-xl border border-border bg-white
                         text-dark text-sm font-medium py-2.5 pr-12 shadow-inset
                         placeholder:text-muted/60"/>
                <button type="button" class="pw-toggle" id="adminPwToggle" aria-label="비밀번호 표시">
                  <svg id="adminEyeOff" style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
                  </svg>
                  <svg id="adminEyeOn" class="hidden" style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </button>
              </div>
            </div>

            <!-- 관리자 로그인 버튼 -->
            <button type="submit" id="adminLoginBtn"
              class="admin-btn w-full text-white font-bold text-sm rounded-xl py-3
                     flex items-center justify-center gap-2 focus:outline-none mt-1">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/>
              </svg>
              <span id="adminBtnText">관리자 로그인</span>
              <div id="adminBtnSpinner" class="spinner hidden"></div>
            </button>
          </form>
        </div>
      </div>
    </div>

  </div><!-- /card -->

  <p class="fixed bottom-4 left-1/2 -translate-x-1/2 text-xs text-muted/70 whitespace-nowrap animate-fade-in delay-500 z-10">
    © {{ current_year }} StudyGroupManager. All rights reserved.
  </p>

  <script>
    function getCsrfToken() {
      return document.querySelector('[name=csrfmiddlewaretoken]').value;
    }
    axios.defaults.headers.common['X-CSRFToken'] = getCsrfToken();
    axios.defaults.headers.common['Content-Type'] = 'application/json';

    const Toast = Swal.mixin({
      toast: true, position: 'top-end',
      showConfirmButton: false, timer: 3000, timerProgressBar: true,
      didOpen: (t) => {
        t.addEventListener('mouseenter', Swal.stopTimer);
        t.addEventListener('mouseleave', Swal.resumeTimer);
      }
    });

    // ── 관리자 패널 토글 ──
    const adminToggleBtn = document.getElementById('adminToggleBtn');
    const adminPanel     = document.getElementById('adminPanel');
    const adminChevron   = document.getElementById('adminChevron');

    adminToggleBtn.addEventListener('click', () => {
      const isOpen = adminPanel.classList.contains('open');
      adminPanel.classList.toggle('open', !isOpen);
      adminChevron.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
    });

    // ── 비밀번호 토글 ──
    document.getElementById('adminPwToggle').addEventListener('click', () => {
      const pw = document.getElementById('adminPassword');
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      document.getElementById('adminEyeOff').classList.toggle('hidden', isHidden);
      document.getElementById('adminEyeOn').classList.toggle('hidden', !isHidden);
    });

    // ── 관리자 폼 제출 ──
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;
      const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email || !emailReg.test(email)) {
        Toast.fire({ icon: 'warning', title: '올바른 이메일을 입력해주세요.' });
        document.getElementById('adminEmail').focus(); return;
      }
      if (!password) {
        Toast.fire({ icon: 'warning', title: '비밀번호를 입력해주세요.' });
        document.getElementById('adminPassword').focus(); return;
      }

      const btn     = document.getElementById('adminLoginBtn');
      const btnText = document.getElementById('adminBtnText');
      const spinner = document.getElementById('adminBtnSpinner');
      btn.disabled = true;
      btnText.classList.add('hidden');
      spinner.classList.remove('hidden');

      try {
        const res = await axios.post('{% url "admin_dashboard" %}', { email, password });

        if (res.data.success) {
          Toast.fire({ icon: 'success', title: '관리자 로그인 성공!' });
          setTimeout(() => {
            window.location.href = res.data.redirect_url || '/admin-console/';
          }, 800);
        } else {
          Swal.fire({
            icon: 'error', title: '로그인 실패',
            text: res.data.message || '이메일 또는 비밀번호를 확인해주세요.',
            confirmButtonText: '확인', confirmButtonColor: '#2563EB',
          });
        }
      } catch (err) {
        const msg = err.response?.data?.message || '서버 오류가 발생했습니다.';
        Swal.fire({
          icon: 'error', title: '오류', text: msg,
          confirmButtonText: '확인', confirmButtonColor: '#2563EB',
        });
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    });

    // ── Enter 키 지원 ──
    document.querySelectorAll('#adminLoginForm input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('adminLoginForm').dispatchEvent(new Event('submit'));
      });
    });

    // ── Django messages ──
    {% if messages %}
      {% for message in messages %}
        Toast.fire({
          icon: '{{ message.tags }}' === 'error' ? 'error'
              : '{{ message.tags }}' === 'success' ? 'success' : 'info',
          title: '{{ message|escapejs }}',
        });
      {% endfor %}
    {% endif %}
  </script>

</body>
</html>
